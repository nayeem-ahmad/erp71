name: Deploy to VPS

# Manual production deploy only — never runs on push.
# GitHub → Actions → "Deploy to VPS" → Run workflow.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Git branch to deploy'
        required: true
        default: main
        type: string

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 66.116.236.127
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /opt/retail-saas
            bash scripts/deploy.sh ${{ inputs.branch }}
            curl -sf https://api.erp71.com/api/v1/health
            curl -sf -o /dev/null -w "app HTTP %{http_code}\n" https://app.erp71.com/